<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Arown Ride v3 後台</title><link rel="stylesheet" href="assets/style.css"></head><body><header><div class="container nav"><a class="logo" href="index.html">AROWN <span>RIDE</span></a><nav><a href="index.html">返回前台</a></nav></div></header><main class="container admin-main"><b class="tag">AROWN RIDE V3.0</b><h1 class="admin-title">正式版管理後台</h1><p>管理 YouTube、品牌資料、影片、路線、商品、店家與 Firebase 雲端同步。</p><div id="globalResult" class="result"></div><div class="tabs"><button class="on" data-tab="youtube">YouTube</button><button data-tab="basic">品牌資料</button><button data-tab="videos">備援影片</button><button data-tab="routes">騎乘路線</button><button data-tab="products">商品推薦</button><button data-tab="stores">合作店家</button><button data-tab="firebase">Firebase</button><button data-tab="backup">備份</button></div>
<section id="tab-youtube" class="tab on"><div class="panel"><h2>YouTube 自動更新</h2><div class="form"><label class="full">API Key<input id="apiKey" type="password"></label><label>Channel ID<input id="channelId"></label><label>顯示數量<select id="maxResults"><option>6</option><option>9</option><option>12</option><option>15</option></select></label><label>快取時間<select id="cacheHours"><option value="1">1 小時</option><option value="3">3 小時</option><option value="6">6 小時</option><option value="12">12 小時</option><option value="24">24 小時</option></select></label><label>頻道網址<input id="channelUrl"></label></div><div class="actions"><button id="saveYoutube" class="btn primary">儲存</button><button id="testYoutube" class="btn ghost">測試連線</button></div></div></section>
<section id="tab-basic" class="tab"><div class="panel"><h2>品牌與聯絡資料</h2><div class="form"><label>網站名稱<input id="siteName"></label><label>首頁標題<input id="heroTitleInput"></label><label class="full">首頁副標題<input id="heroSubtitleInput"></label><label class="full">首頁圖片網址<input id="heroImageInput"></label><label class="full">關於我的騎旅<textarea id="aboutInput"></textarea></label><label>Email<input id="emailInput"></label><label>LINE 連結<input id="lineInput"></label><label>YouTube 頻道<input id="youtubeInput"></label><label>TikTok 帳號<input id="tiktokInput"></label></div><button id="saveBasic" class="btn primary">儲存品牌資料</button></div></section>
<section id="tab-videos" class="tab"><div class="panel"><h2>手動備援影片</h2><input id="videoIndex" type="hidden"><div class="form"><label>標題<input id="videoTitle"></label><label class="full">YouTube 網址<input id="videoUrl"></label><label class="full">說明<textarea id="videoDescription"></textarea></label></div><button id="saveVideo" class="btn primary">新增／更新影片</button></div><div id="videoList" class="list"></div></section>
<section id="tab-routes" class="tab"><div class="panel"><h2>騎乘路線</h2><input id="routeIndex" type="hidden"><div class="form"><label>路線名稱<input id="routeName"></label><label>地區<input id="routeRegion"></label><label>難度<select id="routeDifficulty"><option>輕鬆</option><option>適中</option><option>挑戰</option></select></label><label>里程／時間<input id="routeDistance"></label><label class="full">圖片網址<input id="routeImage"></label><label class="full">說明<textarea id="routeDescription"></textarea></label><label class="full">地圖或文章連結<input id="routeUrl"></label></div><button id="saveRoute" class="btn primary">新增／更新路線</button></div><div id="routeList" class="list"></div></section>
<section id="tab-products" class="tab"><div class="panel"><h2>商品推薦</h2><input id="productIndex" type="hidden"><div class="form"><label>商品名稱<input id="productName"></label><label>價格<input id="productPrice"></label><label>分類<input id="productCategory"></label><label>推薦標籤<input id="productBadge"></label><label class="full">圖片網址<input id="productImage"></label><label class="full">說明<textarea id="productDescription"></textarea></label><label class="full">購買連結<input id="productUrl"></label></div><button id="saveProduct" class="btn primary">新增／更新商品</button></div><div id="productList" class="list"></div></section>
<section id="tab-stores" class="tab"><div class="panel"><h2>合作店家</h2><input id="storeIndex" type="hidden"><div class="form"><label>名稱<input id="storeName"></label><label>類型<input id="storeType"></label><label>地區<input id="storeRegion"></label><label>簡介<input id="storeDescription"></label><label class="full">網址<input id="storeUrl"></label></div><button id="saveStore" class="btn primary">新增／更新店家</button></div><div id="storeList" class="list"></div></section>
<section id="tab-firebase" class="tab"><div class="panel"><h2>Firebase 雲端同步</h2><p>建立 Firebase 專案與 Firestore 後，把 Web App 的 firebaseConfig 貼到下方。未啟用時自動使用本機瀏覽器。</p><label><input id="firebaseEnabled" type="checkbox" style="width:auto"> 啟用 Firebase</label><label class="full">Firebase Config JSON<textarea id="firebaseConfig" placeholder='{"apiKey":"...","authDomain":"...","projectId":"..."}'></textarea></label><div class="actions"><button id="saveFirebase" class="btn primary">儲存 Firebase 設定</button><button id="testFirebaseBtn" class="btn ghost">測試 Firestore</button></div></div></section>
<section id="tab-backup" class="tab"><div class="panel"><h2>備份與還原</h2><div class="actions"><button id="exportData" class="btn primary">下載 JSON 備份</button><label class="btn ghost">匯入 JSON<input id="importFile" type="file" accept=".json" hidden></label><button id="resetData" class="btn danger">恢復預設資料</button></div></div></section></main><script type="module" src="assets/admin.js"></script></body></html>
