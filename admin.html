<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Arown Ride 後台 v3.0.2</title><style>*{box-sizing:border-box}body{margin:0;background:#0a0c10;color:#f7f8fb;font-family:Arial,"Microsoft JhengHei",sans-serif}.wrap{width:min(1100px,calc(100% - 28px));margin:auto;padding:34px 0}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}.top a{color:#f4b942;text-decoration:none}h1{font-size:clamp(2rem,5vw,3.5rem);margin:8px 0}.status{padding:12px 14px;background:#202632;border-radius:10px;color:#aab1c0;margin:14px 0}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:20px 0}.tabs button{padding:10px 14px;border:1px solid #ffffff22;border-radius:10px;background:#202632;color:#fff;cursor:pointer}.tabs button.on{background:#f4b942;color:#111}.tab{display:none}.tab.on{display:block}.panel{background:#151922;border:1px solid #ffffff1c;border-radius:18px;padding:22px;margin-bottom:18px}.form{display:grid;grid-template-columns:1fr 1fr;gap:14px}.full{grid-column:1/-1}label{font-weight:700}input,textarea,select{width:100%;margin-top:6px;padding:11px;border-radius:9px;border:1px solid #ffffff22;background:#202632;color:#fff;font:inherit}textarea{min-height:100px}.btn{padding:11px 16px;border:0;border-radius:10px;background:#f4b942;color:#111;font-weight:800;cursor:pointer;margin-top:14px}.list{display:grid;gap:10px}.item{padding:14px;background:#151922;border:1px solid #ffffff1c;border-radius:12px;display:flex;justify-content:space-between;gap:10px}.item button{padding:7px 10px;border-radius:8px;border:1px solid #ffffff22;background:#202632;color:#fff;cursor:pointer}@media(max-width:700px){.form{grid-template-columns:1fr}.full{grid-column:auto}.item{flex-direction:column}}</style></head><body><main class="wrap"><div class="top"><div><small style="color:#f4b942">AROWN RIDE V3.0.2</small><h1>網站管理後台</h1></div><a href="index.html">返回前台</a></div><div id="status" class="status">後台載入中…</div><div class="tabs"><button class="on" data-tab="youtube">YouTube</button><button data-tab="basic">品牌資料</button><button data-tab="routes">騎乘路線</button><button data-tab="products">商品推薦</button><button data-tab="stores">合作店家</button><button data-tab="backup">備份</button></div><section id="tab-youtube" class="tab on"><div class="panel"><h2>YouTube 設定</h2><div class="form"><label class="full">API Key<input id="apiKey" type="password"></label><label>Channel ID<input id="channelId"></label><label>顯示數量<select id="maxResults"><option>6</option><option>9</option><option>12</option><option>15</option></select></label><label>快取時間<select id="cacheHours"><option>1</option><option>3</option><option>6</option><option>12</option><option>24</option></select></label><label>頻道網址<input id="channelUrl"></label></div><button class="btn" id="saveYoutube">儲存 YouTube 設定</button><button class="btn" id="testYoutube" style="margin-left:8px">測試連線</button></div></section><section id="tab-basic" class="tab"><div class="panel"><h2>品牌資料</h2><div class="form"><label>網站名稱<input id="siteName"></label><label>首頁標題<input id="heroTitle"></label><label class="full">首頁副標題<input id="heroSubtitle"></label><label class="full">首頁圖片網址<input id="heroImage"></label><label class="full">關於我<textarea id="about"></textarea></label><label>Email<input id="email"></label><label>LINE<input id="line"></label><label>YouTube<input id="youtube"></label><label>TikTok<input id="tiktok"></label></div><button class="btn" id="saveBasic">儲存品牌資料</button></div></section><section id="tab-routes" class="tab"><div class="panel"><h2>新增騎乘路線</h2><div class="form"><label>名稱<input id="routeName"></label><label>地區<input id="routeRegion"></label><label>難度<input id="routeDifficulty"></label><label>里程／時間<input id="routeDistance"></label><label class="full">圖片網址<input id="routeImage"></label><label class="full">說明<textarea id="routeDescription"></textarea></label><label class="full">連結<input id="routeUrl"></label></div><button class="btn" id="addRoute">新增路線</button></div><div id="routeList" class="list"></div></section><section id="tab-products" class="tab"><div class="panel"><h2>新增商品</h2><div class="form"><label>名稱<input id="productName"></label><label>價格<input id="productPrice"></label><label>分類<input id="productCategory"></label><label>標籤<input id="productBadge"></label><label class="full">圖片網址<input id="productImage"></label><label class="full">說明<textarea id="productDescription"></textarea></label><label class="full">購買連結<input id="productUrl"></label></div><button class="btn" id="addProduct">新增商品</button></div><div id="productList" class="list"></div></section><section id="tab-stores" class="tab"><div class="panel"><h2>新增店家</h2><div class="form"><label>名稱<input id="storeName"></label><label>類型<input id="storeType"></label><label>地區<input id="storeRegion"></label><label>簡介<input id="storeDescription"></label><label class="full">網址<input id="storeUrl"></label></div><button class="btn" id="addStore">新增店家</button></div><div id="storeList" class="list"></div></section><section id="tab-backup" class="tab"><div class="panel"><h2>備份與還原</h2><button class="btn" id="exportData">下載 JSON 備份</button><label class="btn" style="display:inline-block;margin-left:8px">匯入 JSON<input id="importFile" type="file" accept=".json" hidden></label><button class="btn" id="resetData" style="margin-left:8px;background:#a93648;color:#fff">恢復預設</button></div></section></main><script>(function(){const KEY='arownV3Data';const DEF={site:{name:'Arown Chen 重機騎旅',heroTitle:'騎著重機，記錄每一段旅程',heroSubtitle:'分享道路風景、騎乘路線、旅途故事與騎士用品。',heroImage:'assets/hero-ride.svg',about:'喜歡騎著重機在地面飛行的感覺。',contacts:{email:'yourmail@example.com',line:'https://line.me/',youtube:'https://www.youtube.com/@arown23',tiktok:'https://www.tiktok.com/'}},youtube:{apiKey:'',channelId:'UCETa15xIkxXXhT22Tp2APPw',channelUrl:'https://www.youtube.com/@arown23',maxResults:9,cacheHours:6},manualVideos:[],routes:[],products:[],stores:[]};const $=id=>document.getElementById(id);let data;try{data=JSON.parse(localStorage.getItem(KEY))||JSON.parse(JSON.stringify(DEF))}catch(e){data=JSON.parse(JSON.stringify(DEF))}function show(t){$('status').textContent=t}function save(t){localStorage.setItem(KEY,JSON.stringify(data));render();show(t)}document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-tab]').forEach(x=>x.classList.remove('on'));document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));b.classList.add('on');$('tab-'+b.dataset.tab).classList.add('on')});function fill(){const s=data.site||DEF.site,c=s.contacts||{},y=data.youtube||DEF.youtube;$('siteName').value=s.name||'';$('heroTitle').value=s.heroTitle||'';$('heroSubtitle').value=s.heroSubtitle||'';$('heroImage').value=s.heroImage||'';$('about').value=s.about||'';$('email').value=c.email||'';$('line').value=c.line||'';$('youtube').value=c.youtube||'';$('tiktok').value=c.tiktok||'';$('apiKey').value=y.apiKey||'';$('channelId').value=y.channelId||'';$('maxResults').value=y.maxResults||9;$('cacheHours').value=y.cacheHours||6;$('channelUrl').value=y.channelUrl||''}function list(id,arr,label,type){$(id).innerHTML=(arr||[]).map((x,i)=>'<div class="item"><div><strong>'+label(x)+'</strong></div><button data-del="'+type+'" data-i="'+i+'">刪除</button></div>').join('')||'<div class="panel">尚無資料</div>'}function render(){fill();list('routeList',data.routes,x=>x.name+'｜'+x.region,'route');list('productList',data.products,x=>x.name+'｜'+x.price,'product');list('storeList',data.stores,x=>x.name+'｜'+x.region,'store');document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{const k=b.dataset.del==='route'?'routes':b.dataset.del==='product'?'products':'stores';data[k].splice(+b.dataset.i,1);save('已刪除')})}$('saveYoutube').onclick=()=>{data.youtube={apiKey:$('apiKey').value.trim(),channelId:$('channelId').value.trim(),maxResults:+$('maxResults').value,cacheHours:+$('cacheHours').value,channelUrl:$('channelUrl').value.trim()};save('YouTube 設定已儲存')};$('testYoutube').onclick=async()=>{show('YouTube 測試中…');try{const r=await fetch('https://www.googleapis.com/youtube/v3/channels?part=snippet&id='+encodeURIComponent($('channelId').value.trim())+'&key='+encodeURIComponent($('apiKey').value.trim()));const j=await r.json();if(!r.ok)throw new Error((j.error&&j.error.message)||r.status);show('連線成功：'+((j.items&&j.items[0]&&j.items[0].snippet&&j.items[0].snippet.title)||'頻道已找到'))}catch(e){show('失敗：'+e.message)}};$('saveBasic').onclick=()=>{data.site={name:$('siteName').value,heroTitle:$('heroTitle').value,heroSubtitle:$('heroSubtitle').value,heroImage:$('heroImage').value,about:$('about').value,contacts:{email:$('email').value,line:$('line').value,youtube:$('youtube').value,tiktok:$('tiktok').value}};save('品牌資料已儲存')};$('addRoute').onclick=()=>{data.routes.push({name:$('routeName').value,region:$('routeRegion').value,difficulty:$('routeDifficulty').value,distance:$('routeDistance').value,image:$('routeImage').value,description:$('routeDescription').value,url:$('routeUrl').value});save('路線已新增')};$('addProduct').onclick=()=>{data.products.push({name:$('productName').value,price:$('productPrice').value,category:$('productCategory').value,badge:$('productBadge').value,image:$('productImage').value,description:$('productDescription').value,url:$('productUrl').value});save('商品已新增')};$('addStore').onclick=()=>{data.stores.push({name:$('storeName').value,type:$('storeType').value,region:$('storeRegion').value,description:$('storeDescription').value,url:$('storeUrl').value});save('店家已新增')};$('exportData').onclick=()=>{const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='arown-v3-backup.json';a.click()};$('importFile').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{data=JSON.parse(r.result);save('備份已匯入')}catch(err){show('JSON 格式錯誤')}};r.readAsText(f)};$('resetData').onclick=()=>{if(confirm('確定恢復預設？')){data=JSON.parse(JSON.stringify(DEF));save('已恢復預設')}};render();show('後台已載入，可開始設定。');})();</script></body></html>
