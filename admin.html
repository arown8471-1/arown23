<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Arown Ride v4.0 後台</title><style>*{box-sizing:border-box}:root{--bg:#0b0d12;--card:#171b24;--card2:#202632;--line:#ffffff1d;--text:#f7f8fb;--muted:#aab1c0;--accent:#f4b942}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,"Microsoft JhengHei",sans-serif;line-height:1.6}.wrap{width:min(1120px,calc(100% - 28px));margin:auto;padding:34px 0}.top{display:flex;justify-content:space-between;align-items:center}.top a{color:var(--accent);text-decoration:none}h1{font-size:clamp(2rem,5vw,3.5rem);margin:7px 0}.status{padding:12px 14px;background:var(--card2);border-radius:11px;color:var(--muted);margin:16px 0}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:20px 0}.tabs button{padding:10px 14px;border:1px solid var(--line);border-radius:10px;background:var(--card2);color:white;cursor:pointer}.tabs button.active{background:var(--accent);color:#111}.tab{display:none}.tab.active{display:block}.panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:21px;margin-bottom:18px}.form{display:grid;grid-template-columns:1fr 1fr;gap:14px}.full{grid-column:1/-1}label{font-weight:700}input,textarea,select{width:100%;margin-top:6px;padding:11px;border-radius:9px;border:1px solid var(--line);background:var(--card2);color:white;font:inherit}textarea{min-height:105px}.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}.btn{padding:10px 15px;border:1px solid var(--line);border-radius:10px;background:var(--accent);color:#111;font-weight:800;cursor:pointer}.secondary{background:var(--card2);color:white}.danger{background:#a93648;color:white}.list{display:grid;gap:10px}.item{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:14px;border:1px solid var(--line);background:var(--card);border-radius:12px}.item small{color:var(--muted)}.preview{max-width:340px;max-height:220px;border-radius:12px;margin-top:12px;display:none}.hint{color:var(--muted);font-size:.92rem}.ok{color:#96e8aa}.bad{color:#ff9dab}@media(max-width:720px){.form{grid-template-columns:1fr}.full{grid-column:auto}.item{grid-template-columns:1fr}}</style></head><body><main class="wrap"><div class="top"><div><small style="color:#f4b942">AROWN RIDE V4.0</small><h1>網站管理後台</h1></div><a href="index.html?v=4.0">返回前台</a></div><div id="status" class="status">後台載入中…</div><div class="tabs"><button class="active" data-tab="youtube">YouTube</button><button data-tab="tiktok">TikTok</button><button data-tab="brand">品牌</button><button data-tab="images">圖片</button><button data-tab="routes">路線</button><button data-tab="products">商品</button><button data-tab="stores">店家</button><button data-tab="firebase">Firebase</button><button data-tab="backup">備份</button></div><section id="tab-youtube" class="tab active"><div class="panel"><h2>YouTube</h2><div class="form"><label class="full">API Key<input id="ytKey" type="password"></label><label>Channel ID<input id="ytChannel"></label><label>顯示數量<select id="ytMax"><option>6</option><option>9</option><option>12</option><option>15</option></select></label><label>頻道網址<input id="ytUrl"></label></div><div class="actions"><button class="btn" id="saveYoutube">儲存</button><button class="btn secondary" id="testYoutube">測試連線</button></div></div></section><section id="tab-tiktok" class="tab"><div class="panel"><h2>TikTok 影片</h2><input id="ttIndex" type="hidden"><div class="form"><label>標題<input id="ttTitle"></label><label class="full">完整影片網址<input id="ttUrl" placeholder="https://www.tiktok.com/@帳號/video/123..."></label><label>解析影片 ID<input id="ttId" readonly></label><label class="full">說明<textarea id="ttDescription"></textarea></label></div><div class="actions"><button class="btn" id="saveTikTok">新增／更新</button><button class="btn secondary" id="clearTikTok">清除</button></div></div><div id="ttList" class="list"></div></section><section id="tab-brand" class="tab"><div class="panel"><h2>品牌資料</h2><div class="form"><label>網站名稱<input id="siteName"></label><label>首頁標題<input id="heroTitle"></label><label class="full">首頁副標題<input id="heroSubtitle"></label><label class="full">首頁圖片網址<input id="heroImage"></label><label class="full">關於我<textarea id="about"></textarea></label><label>Email<input id="email"></label><label>LINE<input id="line"></label><label>YouTube<input id="youtube"></label><label>TikTok<input id="tiktok"></label></div><button class="btn" id="saveBrand">儲存品牌資料</button></div></section><section id="tab-images" class="tab"><div class="panel"><h2>圖片管理</h2><p class="hint">未設定 Firebase 時，可先選擇圖片產生本機 Data URL；資料只存在目前瀏覽器。設定 Firebase Storage 後，可上傳成公開網址。</p><label>選擇圖片<input id="imageFile" type="file" accept="image/*"></label><img id="preview" class="preview" alt="預覽"><div class="actions"><button class="btn" id="useHeroLocal">套用為首頁圖片</button><button class="btn secondary" id="fillProductLocal">填入商品圖片</button><button class="btn secondary" id="fillRouteLocal">填入路線圖片</button><button class="btn" id="uploadFirebase">上傳 Firebase Storage</button></div></div></section><section id="tab-routes" class="tab"><div class="panel"><h2>騎乘路線</h2><input id="routeIndex" type="hidden"><div class="form"><label>名稱<input id="routeName"></label><label>地區<input id="routeRegion"></label><label>難度<select id="routeDifficulty"><option>輕鬆</option><option>適中</option><option>挑戰</option></select></label><label>里程／時間<input id="routeDistance"></label><label class="full">圖片網址<input id="routeImage"></label><label class="full">說明<textarea id="routeDescription"></textarea></label><label class="full">連結<input id="routeUrl"></label></div><div class="actions"><button class="btn" id="saveRoute">新增／更新</button><button class="btn secondary" id="clearRoute">清除</button></div></div><div id="routeList" class="list"></div></section><section id="tab-products" class="tab"><div class="panel"><h2>商品推薦</h2><input id="productIndex" type="hidden"><div class="form"><label>名稱<input id="productName"></label><label>價格<input id="productPrice"></label><label>分類<input id="productCategory"></label><label>標籤<input id="productBadge"></label><label class="full">圖片網址<input id="productImage"></label><label class="full">說明<textarea id="productDescription"></textarea></label><label class="full">購買連結<input id="productUrl"></label></div><div class="actions"><button class="btn" id="saveProduct">新增／更新</button><button class="btn secondary" id="clearProduct">清除</button></div></div><div id="productList" class="list"></div></section><section id="tab-stores" class="tab"><div class="panel"><h2>合作店家</h2><input id="storeIndex" type="hidden"><div class="form"><label>名稱<input id="storeName"></label><label>類型<input id="storeType"></label><label>地區<input id="storeRegion"></label><label>簡介<input id="storeDescription"></label><label class="full">網址<input id="storeUrl"></label></div><div class="actions"><button class="btn" id="saveStore">新增／更新</button><button class="btn secondary" id="clearStore">清除</button></div></div><div id="storeList" class="list"></div></section><section id="tab-firebase" class="tab"><div class="panel"><h2>Firebase</h2><p class="hint">請貼入 Firebase Web App 的真實 firebaseConfig JSON。範例文字不能直接使用。</p><label><input id="firebaseEnabled" type="checkbox" style="width:auto"> 啟用 Firebase</label><label class="full">Firebase Config JSON<textarea id="firebaseConfig" placeholder='{"apiKey":"...","authDomain":"...","projectId":"...","storageBucket":"...","appId":"..."}'></textarea></label><div class="actions"><button class="btn" id="saveFirebase">儲存設定</button><button class="btn secondary" id="testFirebase">測試 Firestore</button><button class="btn secondary" id="pushCloud">上傳目前資料到雲端</button></div></div></section><section id="tab-backup" class="tab"><div class="panel"><h2>備份與還原</h2><div class="actions"><button class="btn" id="exportData">下載 JSON</button><label class="btn secondary">匯入 JSON<input id="importFile" type="file" accept=".json" hidden></label><button class="btn danger" id="resetData">恢復預設</button></div></div></section></main><script>(function(){'use strict';const KEY='arownV3Data',FBKEY='arownV4Firebase';const DEF={site:{name:'Arown Chen 重機騎旅',heroTitle:'騎著重機，記錄每一段旅程',heroSubtitle:'分享道路風景、騎乘路線、旅途故事與騎士用品。',heroImage:'assets/hero-ride.svg',about:'喜歡騎著重機在地面飛行的感覺。',contacts:{email:'',line:'',youtube:'https://www.youtube.com/@arown23',tiktok:''}},youtube:{apiKey:'',channelId:'UCETa15xIkxXXhT22Tp2APPw',channelUrl:'https://www.youtube.com/@arown23',maxResults:9},manualVideos:[],tiktokVideos:[],routes:[],products:[],stores:[]};const $=id=>document.getElementById(id),clone=v=>JSON.parse(JSON.stringify(v));let data,localImage='';function load(){try{return Object.assign(clone(DEF),JSON.parse(localStorage.getItem(KEY)||'{}'))}catch{return clone(DEF)}}function save(text){localStorage.setItem(KEY,JSON.stringify(data));render();show(text||'已儲存')}function show(t,ok=true){$('status').textContent=t;$('status').className='status '+(ok?'ok':'bad')}function ttId(u){const m=String(u||'').match(/\/video\/(\d+)/);return m?m[1]:''}function clear(ids){ids.forEach(id=>$(id).value='')}function tabs(){document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-tab]').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');$('tab-'+b.dataset.tab).classList.add('active')})}function fill(){const s=data.site||DEF.site,c=s.contacts||{},y=data.youtube||DEF.youtube,f=getFB();$('siteName').value=s.name||'';$('heroTitle').value=s.heroTitle||'';$('heroSubtitle').value=s.heroSubtitle||'';$('heroImage').value=s.heroImage||'';$('about').value=s.about||'';$('email').value=c.email||'';$('line').value=c.line||'';$('youtube').value=c.youtube||'';$('tiktok').value=c.tiktok||'';$('ytKey').value=y.apiKey||'';$('ytChannel').value=y.channelId||'';$('ytMax').value=y.maxResults||9;$('ytUrl').value=y.channelUrl||'';$('firebaseEnabled').checked=!!f?.enabled;$('firebaseConfig').value=f?.config?JSON.stringify(f.config,null,2):''}function itemList(id,arr,label,type){$(id).innerHTML=(arr||[]).map((x,i)=>'<div class="item"><div><strong>'+label(x)+'</strong></div><div class="actions"><button class="btn secondary" data-edit="'+type+'" data-i="'+i+'">編輯</button><button class="btn danger" data-del="'+type+'" data-i="'+i+'">刪除</button></div></div>').join('')||'<div class="panel">尚無資料</div>'}function render(){data.tiktokVideos=Array.isArray(data.tiktokVideos)?data.tiktokVideos:[];data.routes=Array.isArray(data.routes)?data.routes:[];data.products=Array.isArray(data.products)?data.products:[];data.stores=Array.isArray(data.stores)?data.stores:[];fill();itemList('ttList',data.tiktokVideos,x=>(x.title||'TikTok')+'｜'+(x.videoId||ttId(x.url)||''),'tt');itemList('routeList',data.routes,x=>x.name+'｜'+x.region,'route');itemList('productList',data.products,x=>x.name+'｜'+x.price,'product');itemList('storeList',data.stores,x=>x.name+'｜'+x.region,'store');bindItems()}function bindItems(){document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{const map={tt:'tiktokVideos',route:'routes',product:'products',store:'stores'},k=map[b.dataset.del];if(confirm('確定刪除？')){data[k].splice(+b.dataset.i,1);save('已刪除')}});document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>edit(b.dataset.edit,+b.dataset.i))}function edit(t,i){const x=t==='tt'?data.tiktokVideos[i]:t==='route'?data.routes[i]:t==='product'?data.products[i]:data.stores[i];if(t==='tt'){$('ttIndex').value=i;$('ttTitle').value=x.title||'';$('ttUrl').value=x.url||'';$('ttId').value=x.videoId||ttId(x.url);$('ttDescription').value=x.description||''}if(t==='route'){$('routeIndex').value=i;$('routeName').value=x.name||'';$('routeRegion').value=x.region||'';$('routeDifficulty').value=x.difficulty||'輕鬆';$('routeDistance').value=x.distance||'';$('routeImage').value=x.image||'';$('routeDescription').value=x.description||'';$('routeUrl').value=x.url||''}if(t==='product'){$('productIndex').value=i;$('productName').value=x.name||'';$('productPrice').value=x.price||'';$('productCategory').value=x.category||'';$('productBadge').value=x.badge||'';$('productImage').value=x.image||'';$('productDescription').value=x.description||'';$('productUrl').value=x.url||''}if(t==='store'){$('storeIndex').value=i;$('storeName').value=x.name||'';$('storeType').value=x.type||'';$('storeRegion').value=x.region||'';$('storeDescription').value=x.description||'';$('storeUrl').value=x.url||''}}function getFB(){try{return JSON.parse(localStorage.getItem(FBKEY)||'null')}catch{return null}}function fbConfig(){const f=getFB();if(!f?.enabled||!f.config?.projectId)throw Error('尚未啟用 Firebase 或設定不完整');return f.config}async function pushFirestore(){const c=fbConfig(),url='https://firestore.googleapis.com/v1/projects/'+c.projectId+'/databases/(default)/documents/site/content?updateMask.fieldPaths=payload';const body={fields:{payload:{stringValue:JSON.stringify(data)}}};const r=await fetch(url,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});if(!r.ok)throw Error(await r.text());return true}async function uploadStorage(file){const c=fbConfig();if(!c.storageBucket)throw Error('storageBucket 未設定');const name=Date.now()+'-'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');const url='https://firebasestorage.googleapis.com/v0/b/'+encodeURIComponent(c.storageBucket)+'/o?uploadType=media&name='+encodeURIComponent('uploads/'+name);const r=await fetch(url,{method:'POST',headers:{'Content-Type':file.type||'application/octet-stream'},body:file});if(!r.ok)throw Error(await r.text());const j=await r.json();const token=(j.downloadTokens||'').split(',')[0];return 'https://firebasestorage.googleapis.com/v0/b/'+encodeURIComponent(c.storageBucket)+'/o/'+encodeURIComponent(j.name)+'?alt=media'+(token?'&token='+token:'')}tabs();data=load();render();show('v4.0 後台已載入，可開始設定');$('ttUrl').oninput=()=>{$('ttId').value=ttId($('ttUrl').value)};$('saveYoutube').onclick=()=>{data.youtube={apiKey:$('ytKey').value.trim(),channelId:$('ytChannel').value.trim(),maxResults:+$('ytMax').value,channelUrl:$('ytUrl').value.trim()};save('YouTube 設定已儲存')};$('testYoutube').onclick=async()=>{show('YouTube 測試中…');try{const r=await fetch('https://www.googleapis.com/youtube/v3/channels?part=snippet&id='+encodeURIComponent($('ytChannel').value.trim())+'&key='+encodeURIComponent($('ytKey').value.trim())),j=await r.json();if(!r.ok)throw Error(j?.error?.message||r.status);show('連線成功：'+(j.items?.[0]?.snippet?.title||'頻道已找到'))}catch(e){show('YouTube 測試失敗：'+e.message,false)}};$('saveBrand').onclick=()=>{data.site={name:$('siteName').value,heroTitle:$('heroTitle').value,heroSubtitle:$('heroSubtitle').value,heroImage:$('heroImage').value,about:$('about').value,contacts:{email:$('email').value,line:$('line').value,youtube:$('youtube').value,tiktok:$('tiktok').value}};save('品牌資料已儲存')};$('clearTikTok').onclick=()=>clear(['ttIndex','ttTitle','ttUrl','ttId','ttDescription']);$('saveTikTok').onclick=()=>{const id=ttId($('ttUrl').value),i=$('ttIndex').value;if(!id)return show('無法解析 TikTok 影片 ID',false);const x={title:$('ttTitle').value||'TikTok 影片',url:$('ttUrl').value,videoId:id,description:$('ttDescription').value};i===''?data.tiktokVideos.push(x):data.tiktokVideos[+i]=x;$('clearTikTok').click();save('TikTok 已儲存')};$('clearRoute').onclick=()=>clear(['routeIndex','routeName','routeRegion','routeDistance','routeImage','routeDescription','routeUrl']);$('saveRoute').onclick=()=>{const i=$('routeIndex').value,x={name:$('routeName').value,region:$('routeRegion').value,difficulty:$('routeDifficulty').value,distance:$('routeDistance').value,image:$('routeImage').value,description:$('routeDescription').value,url:$('routeUrl').value};i===''?data.routes.push(x):data.routes[+i]=x;$('clearRoute').click();save('路線已儲存')};$('clearProduct').onclick=()=>clear(['productIndex','productName','productPrice','productCategory','productBadge','productImage','productDescription','productUrl']);$('saveProduct').onclick=()=>{const i=$('productIndex').value,x={name:$('productName').value,price:$('productPrice').value,category:$('productCategory').value,badge:$('productBadge').value,image:$('productImage').value,description:$('productDescription').value,url:$('productUrl').value};i===''?data.products.push(x):data.products[+i]=x;$('clearProduct').click();save('商品已儲存')};$('clearStore').onclick=()=>clear(['storeIndex','storeName','storeType','storeRegion','storeDescription','storeUrl']);$('saveStore').onclick=()=>{const i=$('storeIndex').value,x={name:$('storeName').value,type:$('storeType').value,region:$('storeRegion').value,description:$('storeDescription').value,url:$('storeUrl').value};i===''?data.stores.push(x):data.stores[+i]=x;$('clearStore').click();save('店家已儲存')};$('imageFile').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{localImage=r.result;$('preview').src=localImage;$('preview').style.display='block';show('圖片已載入，可套用或上傳')};r.readAsDataURL(f)};$('useHeroLocal').onclick=()=>{if(!localImage)return show('請先選擇圖片',false);data.site.heroImage=localImage;save('首頁圖片已套用到目前瀏覽器')};$('fillProductLocal').onclick=()=>{if(!localImage)return show('請先選擇圖片',false);$('productImage').value=localImage;show('已填入商品圖片欄位')};$('fillRouteLocal').onclick=()=>{if(!localImage)return show('請先選擇圖片',false);$('routeImage').value=localImage;show('已填入路線圖片欄位')};$('uploadFirebase').onclick=async()=>{const f=$('imageFile').files[0];if(!f)return show('請先選擇圖片',false);try{show('圖片上傳中…');const u=await uploadStorage(f);localImage=u;$('heroImage').value=u;show('Firebase Storage 上傳成功，網址已填入首頁圖片欄位')}catch(e){show('上傳失敗：'+e.message,false)}};$('saveFirebase').onclick=()=>{try{const config=JSON.parse($('firebaseConfig').value);localStorage.setItem(FBKEY,JSON.stringify({enabled:$('firebaseEnabled').checked,config}));show('Firebase 設定已儲存')}catch(e){show('Firebase Config 必須是有效 JSON',false)}};$('testFirebase').onclick=async()=>{try{const c=fbConfig(),u='https://firestore.googleapis.com/v1/projects/'+c.projectId+'/databases/(default)/documents/site/content';const r=await fetch(u);if(r.status!==200&&r.status!==404)throw Error(await r.text());show('Firestore 連線成功')}catch(e){show('Firestore 測試失敗：'+e.message,false)}};$('pushCloud').onclick=async()=>{try{show('上傳雲端中…');await pushFirestore();show('目前資料已上傳 Firestore')}catch(e){show('雲端上傳失敗：'+e.message,false)}};$('exportData').onclick=()=>{const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='arown-ride-v4-backup.json';a.click();URL.revokeObjectURL(a.href)};$('importFile').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{data=JSON.parse(r.result);save('備份已匯入')}catch{show('JSON 格式錯誤',false)}};r.readAsText(f)};$('resetData').onclick=()=>{if(confirm('恢復預設資料？')){data=clone(DEF);save('已恢復預設資料')}}})();</script></body></html>
