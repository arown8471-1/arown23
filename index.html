<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="Arown Ride 重機騎旅品牌網站"><title>Arown Ride v4.0</title><style>*{box-sizing:border-box}:root{--bg:#0b0d12;--card:#171b24;--line:#ffffff1d;--text:#f7f8fb;--muted:#aab1c0;--accent:#f4b942;--max:1180px}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,"Microsoft JhengHei",sans-serif;line-height:1.65}a{color:inherit;text-decoration:none}.container{width:min(var(--max),calc(100% - 30px));margin:auto}header{position:sticky;top:0;z-index:30;background:#0b0d12e8;border-bottom:1px solid var(--line);backdrop-filter:blur(14px)}.nav{min-height:70px;display:flex;align-items:center;justify-content:space-between;gap:20px}.logo{font-weight:900;letter-spacing:.12em}.logo span,.tag{color:var(--accent)}nav{display:flex;gap:16px;align-items:center}nav a{color:var(--muted)}.admin{border:1px solid var(--line);padding:7px 11px;border-radius:10px}.hero{padding:86px 0 58px;background:radial-gradient(circle at 15% 15%,#d65a3135,transparent 32%),radial-gradient(circle at 85% 15%,#f4b94224,transparent 28%)}.hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:36px;align-items:center}h1{font-size:clamp(2.7rem,7vw,5.2rem);line-height:1.04;margin:0 0 18px}h2{font-size:clamp(1.8rem,4vw,2.7rem);margin:.1em 0 .35em}.hero p,.head p,.card p{color:var(--muted)}.hero-card,.card{background:var(--card);border:1px solid var(--line);border-radius:22px;overflow:hidden;box-shadow:0 20px 52px #0006}.hero-card{padding:20px}.hero-card img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:15px}.actions{display:flex;gap:11px;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:0 17px;border-radius:12px;border:1px solid var(--line);font-weight:800;cursor:pointer}.primary{background:var(--accent);color:#151515}.ghost{background:#202632}.stats{display:flex;gap:24px;margin-top:27px}.stats div{display:grid}.stats strong{font-size:1.45rem}.stats span{font-size:.82rem;color:var(--muted)}.section{padding:70px 0}.alt{background:#ffffff06}.head{display:flex;justify-content:space-between;align-items:end;gap:22px;margin-bottom:25px}.grid{display:grid;gap:22px}.three{grid-template-columns:repeat(3,1fr)}.four{grid-template-columns:repeat(4,1fr)}.card img{width:100%;aspect-ratio:4/3;object-fit:cover}.body{padding:18px}.chips{display:flex;gap:7px;flex-wrap:wrap}.chip{font-size:.78rem;color:var(--muted);padding:4px 8px;border:1px solid var(--line);border-radius:999px}.price{color:var(--accent);font-weight:900}.videoFrame{aspect-ratio:16/9;background:#000}.videoFrame.tiktok{aspect-ratio:9/16;max-height:640px}.videoFrame iframe{width:100%;height:100%;border:0}.store{padding:21px}.store span{display:block;color:var(--muted);font-size:.9rem}.about{display:grid;grid-template-columns:1fr 1fr;gap:22px}.contacts{display:grid;gap:10px}.contacts a{padding:12px;background:#202632;border:1px solid var(--line);border-radius:10px}.empty{padding:24px;border:1px dashed var(--line);border-radius:14px;color:var(--muted)}footer{text-align:center;padding:28px;color:var(--muted);border-top:1px solid var(--line)}#menu{display:none;background:none;border:0;color:white;font-size:1.4rem}@media(max-width:920px){.three{grid-template-columns:repeat(2,1fr)}.four{grid-template-columns:repeat(2,1fr)}}@media(max-width:760px){.hero-grid,.about,.three,.four{grid-template-columns:1fr}.head{align-items:flex-start;flex-direction:column}.stats{gap:14px;flex-wrap:wrap}#menu{display:block}nav{display:none;position:absolute;top:64px;left:15px;right:15px;flex-direction:column;align-items:stretch;background:var(--card);padding:15px;border:1px solid var(--line);border-radius:12px}nav.open{display:flex}}</style></head><body><header><div class="container nav"><a class="logo" href="#home">AROWN <span>RIDE</span></a><button id="menu">☰</button><nav id="nav"><a href="#youtube">YouTube</a><a href="#tiktok">TikTok</a><a href="#routes">路線</a><a href="#products">商品</a><a href="#stores">店家</a><a href="#about">關於</a><a class="admin" href="admin.html?v=4.0">後台</a></nav></div></header><main id="home"><section class="hero"><div class="container hero-grid"><div><b class="tag">MOTORCYCLE × TRAVEL × VIDEO</b><h1 id="heroTitle">騎著重機，記錄每一段旅程</h1><p id="heroSubtitle"></p><div class="actions"><a class="btn primary" href="#youtube">觀看影音</a><a class="btn ghost" id="youtubeChannel" target="_blank" rel="noopener">前往 YouTube</a></div><div class="stats"><div><strong id="ytCount">0</strong><span>YouTube</span></div><div><strong id="ttCount">0</strong><span>TikTok</span></div><div><strong id="routeCount">0</strong><span>路線</span></div><div><strong id="productCount">0</strong><span>商品</span></div></div></div><div class="hero-card"><img id="heroImage" src="assets/hero-ride.svg" alt="首頁圖片"></div></div></section><section id="youtube" class="section"><div class="container"><div class="head"><div><b class="tag">YOUTUBE</b><h2>最新影片</h2></div><span id="ytStatus">讀取中…</span></div><div id="youtubeGrid" class="grid three"></div></div></section><section id="tiktok" class="section alt"><div class="container"><div class="head"><div><b class="tag">TIKTOK</b><h2>精選短影音</h2></div><p>若平台限制嵌入，可點擊前往 TikTok。</p></div><div id="tiktokGrid" class="grid three"></div></div></section><section id="routes" class="section"><div class="container"><div class="head"><div><b class="tag">RIDE ROUTES</b><h2>騎乘路線</h2></div></div><div id="routeGrid" class="grid three"></div></div></section><section id="products" class="section alt"><div class="container"><div class="head"><div><b class="tag">RIDER PICKS</b><h2>商品推薦</h2></div></div><div id="productGrid" class="grid three"></div></div></section><section id="stores" class="section"><div class="container"><div class="head"><div><b class="tag">PARTNERS</b><h2>合作店家</h2></div></div><div id="storeGrid" class="grid four"></div></div></section><section id="about" class="section alt"><div class="container about"><article class="card body"><b class="tag">ABOUT</b><h2>關於我的騎旅</h2><p id="aboutText"></p></article><article class="card body"><b class="tag">FOLLOW</b><h2>追蹤與聯絡</h2><div id="contacts" class="contacts"></div></article></div></section></main><footer>© <span id="year"></span> <span id="siteName"></span></footer><script>(function(){const KEY='arownV3Data',FBKEY='arownV4Firebase';const DEF={site:{name:'Arown Chen 重機騎旅',heroTitle:'騎著重機，記錄每一段旅程',heroSubtitle:'分享道路風景、騎乘路線、旅途故事與騎士用品。',heroImage:'assets/hero-ride.svg',about:'喜歡騎著重機在地面飛行的感覺。',contacts:{email:'',line:'',youtube:'https://www.youtube.com/@arown23',tiktok:''}},youtube:{apiKey:'',channelId:'UCETa15xIkxXXhT22Tp2APPw',channelUrl:'https://www.youtube.com/@arown23',maxResults:9},manualVideos:[],tiktokVideos:[],routes:[],products:[],stores:[]};const $=id=>document.getElementById(id),clone=v=>JSON.parse(JSON.stringify(v)),esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));function local(){try{return Object.assign(clone(DEF),JSON.parse(localStorage.getItem(KEY)||'{}'))}catch{return clone(DEF)}}async function cloud(d){try{const f=JSON.parse(localStorage.getItem(FBKEY)||'null');if(!f?.enabled||!f.config?.projectId)return d;const url='https://firestore.googleapis.com/v1/projects/'+f.config.projectId+'/databases/(default)/documents/site/content';const r=await fetch(url);if(!r.ok)return d;const j=await r.json();const raw=j.fields?.payload?.stringValue;if(!raw)return d;const x=JSON.parse(raw);localStorage.setItem(KEY,JSON.stringify(x));return Object.assign(clone(DEF),x)}catch{return d}}function ttId(u){const m=String(u||'').match(/\/video\/(\d+)/);return m?m[1]:''}function ytId(u){try{const x=new URL(u);if(x.hostname.includes('youtu.be'))return x.pathname.split('/').filter(Boolean)[0]||'';return x.searchParams.get('v')||x.pathname.split('/shorts/')[1]||''}catch{return ''}}function cardText(t,b,l,u){return '<article class="card"><div class="body"><h3>'+esc(t)+'</h3><p>'+esc(b||'')+'</p><a class="btn ghost" target="_blank" rel="noopener" href="'+esc(u||'#')+'">'+l+'</a></div></article>'}async function youtube(d){const g=$('youtubeGrid'),y=d.youtube||{};try{let items=[];if(y.apiKey&&y.channelId){const c=await fetch('https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id='+encodeURIComponent(y.channelId)+'&key='+encodeURIComponent(y.apiKey)).then(r=>r.json());const p=c.items?.[0]?.contentDetails?.relatedPlaylists?.uploads;if(p){const q=await fetch('https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId='+p+'&maxResults='+(y.maxResults||9)+'&key='+encodeURIComponent(y.apiKey)).then(r=>r.json());items=(q.items||[]).filter(x=>x.contentDetails?.videoId).map(x=>({id:x.contentDetails.videoId,title:x.snippet.title,thumb:x.snippet.thumbnails?.high?.url}))}}if(!items.length)items=(d.manualVideos||[]).map(v=>({id:ytId(v.url),title:v.title,thumb:'https://i.ytimg.com/vi/'+ytId(v.url)+'/hqdefault.jpg'})).filter(v=>v.id);g.innerHTML=items.map(v=>'<article class="card"><div class="videoFrame"><iframe src="https://www.youtube.com/embed/'+esc(v.id)+'?rel=0" title="'+esc(v.title)+'" allowfullscreen></iframe></div><div class="body"><h3>'+esc(v.title)+'</h3><a class="btn ghost" target="_blank" rel="noopener" href="https://www.youtube.com/watch?v='+esc(v.id)+'">前往 YouTube</a></div></article>').join('')||'<div class="empty">尚未設定 YouTube 影片。</div>';$('ytCount').textContent=items.length;$('ytStatus').textContent=items.length?'已載入 '+items.length+' 支影片':'尚無影片'}catch(e){g.innerHTML='<div class="empty">YouTube 讀取失敗，請至後台檢查 API Key。</div>';$('ytStatus').textContent='讀取失敗'}}function render(d){const s=d.site||DEF.site,c=s.contacts||{};document.title=s.name||'Arown Ride';$('heroTitle').textContent=s.heroTitle||'';$('heroSubtitle').textContent=s.heroSubtitle||'';$('heroImage').src=s.heroImage||DEF.site.heroImage;$('aboutText').textContent=s.about||'';$('siteName').textContent=s.name||'';$('youtubeChannel').href=c.youtube||d.youtube?.channelUrl||'#';$('contacts').innerHTML=['email','line','youtube','tiktok'].filter(k=>c[k]).map(k=>'<a target="_blank" rel="noopener" href="'+(k==='email'?'mailto:':'')+esc(c[k])+'">'+k.toUpperCase()+'</a>').join('');const tt=d.tiktokVideos||[];$('ttCount').textContent=tt.length;$('tiktokGrid').innerHTML=tt.map(v=>{const id=v.videoId||ttId(v.url);return id?'<article class="card"><div class="videoFrame tiktok"><iframe src="https://www.tiktok.com/player/v1/'+id+'?autoplay=0" title="'+esc(v.title||'TikTok')+'" allowfullscreen></iframe></div><div class="body"><h3>'+esc(v.title||'TikTok')+'</h3><p>'+esc(v.description||'')+'</p><a class="btn ghost" target="_blank" rel="noopener" href="'+esc(v.url)+'">前往 TikTok</a></div></article>':cardText(v.title,'無法解析影片 ID','前往 TikTok',v.url)}).join('')||'<div class="empty">尚未新增 TikTok 影片。</div>';const r=d.routes||[];$('routeCount').textContent=r.length;$('routeGrid').innerHTML=r.map(x=>'<article class="card"><img src="'+esc(x.image||'assets/route-1.svg')+'"><div class="body"><div class="chips"><span class="chip">'+esc(x.region)+'</span><span class="chip">'+esc(x.difficulty)+'</span></div><h3>'+esc(x.name)+'</h3><p>'+esc(x.description)+'</p><a class="btn ghost" target="_blank" href="'+esc(x.url||'#')+'">查看路線</a></div></article>').join('')||'<div class="empty">尚未新增路線。</div>';const p=d.products||[];$('productCount').textContent=p.length;$('productGrid').innerHTML=p.map(x=>'<article class="card"><img src="'+esc(x.image||'assets/product-1.svg')+'"><div class="body"><div class="chips"><span class="chip">'+esc(x.category)+'</span><span class="chip">'+esc(x.badge)+'</span></div><h3>'+esc(x.name)+'</h3><div class="price">'+esc(x.price)+'</div><p>'+esc(x.description)+'</p><a class="btn primary" target="_blank" href="'+esc(x.url||'#')+'">前往購買</a></div></article>').join('')||'<div class="empty">尚未新增商品。</div>';$('storeGrid').innerHTML=(d.stores||[]).map(x=>'<a class="card store" target="_blank" href="'+esc(x.url||'#')+'"><strong>'+esc(x.name)+'</strong><span>'+esc(x.type)+'｜'+esc(x.region)+'</span><span>'+esc(x.description)+'</span></a>').join('')||'<div class="empty">尚未新增店家。</div>';$('year').textContent=new Date().getFullYear();youtube(d)}$('menu').onclick=()=>$('nav').classList.toggle('open');cloud(local()).then(render)})();</script></body></html>
